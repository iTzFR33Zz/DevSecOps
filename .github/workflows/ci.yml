name: Application Pipeline

on:
  push:
  workflow_dispatch:
    inputs:
      target_sub_env:
        description: 'Environnement cible (ex: sandbox)'
        required: false
        type: string
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  security-events: write
  actions: read
  issues: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          echo "::group::Installation des modules Node.js"
          npm ci
          echo "::endgroup::"

      - name: Run tests
        run: npm test

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'reports/junit.xml'
          detailed_summary: true
          include_passed: true

      - name: Start API for DAST
        run: |
          npm start &
          npx wait-on http://localhost:3000

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          fail_action: false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t devsecops-app:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-staging-prod:
    runs-on: ubuntu-latest
    needs: docker-build-and-scan
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Setup age
        run: |
          curl -LO https://github.com/FiloSottile/age/releases/download/v1.1.1/age-v1.1.1-linux-amd64.tar.gz
          tar xzf age-v1.1.1-linux-amd64.tar.gz
          sudo mv age/age age/age-keygen /usr/local/bin/

      - name: Setup SOPS
        run: |
          curl -LO https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
          sudo mv sops-v3.8.1.linux.amd64 /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          # Use age key from secret
          mkdir -p ~/.config/sops/age
          echo "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          # Decrypt secrets
          sops -d secrets-prod.yaml > secrets-prod-decrypted.json --output-type json
          
          # Mask the decrypted values in logs
          AWS_KEY=$(jq -r '.SIMULATED_AWS_KEY' secrets-prod-decrypted.json)
          INTERNAL=$(jq -r '.INTERNAL_TOKEN' secrets-prod-decrypted.json)
          echo "::add-mask::$AWS_KEY"
          echo "::add-mask::$INTERNAL"
          
          # Output to GITHUB_ENV
          echo "SIMULATED_AWS_KEY=$AWS_KEY" >> $GITHUB_ENV
          echo "INTERNAL_TOKEN=$INTERNAL" >> $GITHUB_ENV
          
          # Clean up decrypted file
          rm secrets-prod-decrypted.json

      - name: Test Secrets and Variables
        env:
          APP_ENV: ${{ vars.APP_ENVIRONMENT }}
          AWS_KEY: ${{ env.SIMULATED_AWS_KEY }}
          INTERNAL: ${{ env.INTERNAL_TOKEN }}
        run: |
          echo "Environment: $APP_ENV"
          echo "AWS Key: $AWS_KEY"
          echo "Internal Token: $INTERNAL"
          node src/app.js &
          sleep 2
          curl -s http://localhost:3000/api/health || true
